name: Pending theorem audit

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Pending theorem report
        run: python3 scripts/check_pending.py
      - name: Blueprint text drift report
        run: python3 scripts/check_blueprint.py
